# ===================================================================
# MINIMAL MODERN TMUX CONFIGURATION
# ===================================================================
# A robust, plugin-free tmux config that works on any machine
# Place this file at: ~/.config/tmux/tmux.conf or ~/.tmux.conf

# ===================================================================
# GENERAL SETTINGS
# ===================================================================

# Set true color support (24-bit color) - works on most modern terminals
set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "screen-256color"

# set-option -sa terminal-overrides ",alacritty:RGB"
# set -g default-terminal "tmux-256color"


# Enable mouse support for modern usage
set -g mouse on

# Start windows and panes at 1, not 0 (more intuitive)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size from default 2000
set -g history-limit 50000

# Display tmux messages for 4 seconds
set -g display-time 4000

# Display pane numbers for 2 seconds (longer than default)
set -g display-panes-time 2000

# Refresh status bar every 5 seconds
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Faster command sequences (reduce escape time)
set -s escape-time 0

# ===================================================================
# KEY BINDINGS - KEEPING PREFIX AS Ctrl-b (DEFAULT)
# ===================================================================

# Keep default Ctrl-b prefix for portability
# (Uncomment next 3 lines if you prefer Ctrl-a)
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# Reload config file quickly
bind r source-file ~/.config/tmux/tmux.conf \; display-message "✓ Config reloaded!"

# Better pane splitting (more intuitive) - keeping defaults too
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"  # Alternative for |
# Note: Default % and " still work for compatibility

# Create new window in current directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation (Vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window navigation
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Pane resizing with repeatable keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Keep default arrow navigation, use Ctrl+arrow for resizing (default behavior)
# Default Ctrl-b + arrow keys navigate panes
# Default Ctrl-b + Ctrl+arrow keys resize panes

# Quick pane selection (show numbers indefinitely until key press)
bind q display-panes -d 0

# Maximize/restore pane (toggle zoom)
bind m resize-pane -Z

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Last window and pane
bind Space last-window
bind Tab last-pane

# Kill pane/window confirmations (safer)
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #W? (y/n)" kill-window

# Session management
bind S choose-session
bind N new-session

# Easy pane synchronization toggle
bind e setw synchronize-panes \; display-message "✓ Pane synchronization toggled"

# ===================================================================
# COPY MODE SETTINGS
# ===================================================================

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Enter copy mode
bind [ copy-mode
bind Escape copy-mode

# Copy mode bindings (vim-style)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Copy to system clipboard (works on most Linux systems)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || pbcopy 2>/dev/null || cat"

# Paste from tmux buffer
bind p paste-buffer

# Search in copy mode
bind / copy-mode \; send-key ?

# ===================================================================
# APPEARANCE AND STATUS BAR
# ===================================================================

# Status bar position
set-option -g status-position bottom

# Status bar general styling
set -g status-style 'bg=#2e3440,fg=#d8dee9'
set -g status-justify left

# Window status styling
setw -g window-status-style 'fg=#81a1c1,bg=default'
setw -g window-status-current-style 'fg=#2e3440,bg=#88c0d0,bold'
setw -g window-status-activity-style 'fg=#bf616a,bg=default'

# Pane border colors
set -g pane-border-style 'fg=#4c566a'
set -g pane-active-border-style 'fg=#88c0d0'

# Message styling
set -g message-style 'fg=#2e3440,bg=#ebcb8b'
set -g message-command-style 'fg=#2e3440,bg=#a3be8c'

# Mode styling (copy mode, etc.)
set -g mode-style 'fg=#2e3440,bg=#88c0d0'

# Status bar content
set -g status-left-length 30
set -g status-left '#[fg=#2e3440,bg=#88c0d0,bold] #S #[fg=#88c0d0,bg=#2e3440] '

set -g status-right-length 60
set -g status-right '#[fg=#616e88] %Y-%m-%d #[fg=#d8dee9]│ #[fg=#d8dee9]%H:%M #[fg=#88c0d0] #[fg=#2e3440,bg=#88c0d0,bold] #h '

# Window status format
set -g window-status-format ' #I:#W#F '
set -g window-status-current-format ' #I:#W#F '

# ===================================================================
# ACTIVITY AND NOTIFICATIONS
# ===================================================================

# Monitor activity in windows
setw -g monitor-activity on
set -g visual-activity off  # Don't show activity messages

# Bell settings
set -g visual-bell off
set -g bell-action none

# Don't show silence notifications
set -g visual-silence off

# ===================================================================
# ADVANCED SETTINGS
# ===================================================================

# Don't exit tmux when closing a session
set -g detach-on-destroy off

# Allow automatic renaming of windows
set -g allow-rename on
set -g automatic-rename on

# Word separators for copy mode
set -g word-separators ' @"=()[]'
set -ag word-separators "'"

# Terminal title
set -g set-titles on
set -g set-titles-string '#T'

# ===================================================================
# MOUSE ENHANCEMENTS
# ===================================================================

# Middle click to paste
bind-key -n MouseDown2Pane run "tmux set-buffer \"$(xclip -o -sel clipboard 2>/dev/null || pbpaste 2>/dev/null)\"; tmux paste-buffer"

# Double click to select word
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word

# Triple click to select line
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line

# ===================================================================
# USEFUL ALIASES/SHORTCUTS
# ===================================================================

# Quick dev setup - create common panes
bind D split-window -h -c "#{pane_current_path}" \; split-window -v -c "#{pane_current_path}" \; select-pane -t 0

# Clear screen and scrollback
bind C-k send-keys 'clear && printf "\e[3J"' \; send-keys 'Enter'

# Swap window positions
bind -r , swap-window -t -1\; select-window -t -1
bind -r . swap-window -t +1\; select-window -t +1

# ===================================================================
# CONDITIONAL SETTINGS FOR DIFFERENT SYSTEMS
# ===================================================================

# macOS specific settings
if-shell 'test "$(uname)" = "Darwin"' 'set -g default-command "reattach-to-user-namespace -l $SHELL"'

# Different clipboard commands for different systems
if-shell 'which xclip > /dev/null 2>&1' 'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'
if-shell 'which pbcopy > /dev/null 2>&1' 'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'

# ===================================================================
# QUICK REFERENCE
# ===================================================================

# Key Bindings Summary:
# Prefix: Ctrl-b (default, portable)
# 
# Panes:
#   | or \    - Split horizontally
#   -        - Split vertically
#   h,j,k,l  - Navigate panes (vim style)
#   H,J,K,L  - Resize panes
#   m        - Maximize/restore pane
#   x        - Close pane (with confirmation)
#   e        - Synchronize panes
#   q        - Show pane numbers
#
# Windows:
#   c        - Create window
#   n/p      - Next/previous window
#   ,/.      - Move window left/right
#   X        - Close window (with confirmation)
#   Space    - Last window
#
# Sessions:
#   S        - Choose session
#   N        - New session
#
# Copy Mode:
#   [        - Enter copy mode
#   v        - Start selection
#   y        - Copy selection
#   p        - Paste
#
# Other:
#   r        - Reload config
#   D        - Quick dev layout
